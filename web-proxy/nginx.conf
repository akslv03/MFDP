events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://streamlit:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        location /_stcore/ {
            proxy_pass http://streamlit:8501/_stcore/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /api/ {
            proxy_pass http://app:8080/api/;
            proxy_set_header Host $host;
            client_max_body_size 200M;
        }

        location /auth/ {
            proxy_pass http://app:8080/auth/;
            proxy_set_header Host $host;
        }

        location /uploads/ {
            proxy_pass http://app:8080/uploads/;
            proxy_set_header Host $host;
        }

        location /case-previews/ {
            proxy_pass http://app:8080/case-previews/;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://app:8080/health;
        }

        location /api/docs {
            proxy_pass http://app:8080/api/docs;
        }
    }
}
